name: Track B CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Schema validation (positive)
        run: pnpm exec ajv validate -s schemas/episode-metadata.json -d schemas/fixtures/valid-episode.json --spec=draft2020 -c ajv-formats

      - name: Schema validation (negative)
        run: |
          ! pnpm exec ajv validate -s schemas/episode-metadata.json -d schemas/fixtures/invalid-episode.json --spec=draft2020 -c ajv-formats
